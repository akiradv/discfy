<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Discfy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Fundo estilo Apple Music */
    #album-bg {
      position: fixed;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(80px) brightness(0.6);
      transition: background-image 1.2s ease;
      will-change: transform;
    }
    #album-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
      pointer-events: none;
    }

    /* Header com botão de configurações */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    header .header-actions {
      display: flex;
      gap: 12px;
    }
    header button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    header button:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }

    /* Login */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      text-align: center;
      padding: 24px;
    }
    #login-overlay h2 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #login-overlay p {
      color: #aaa;
      font-size: 18px;
      max-width: 400px;
      margin-bottom: 32px;
    }
    #login-overlay button {
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 14px 40px;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }
    #login-overlay button:hover {
      transform: scale(1.05);
    }

    /* Loading */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    #loading-screen.active {
      display: flex;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #222;
      border-top: 4px solid #1db954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Carrossel 3D */
    #carousel-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      touch-action: none;
    }
    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    /* Vinil redondo (não esticado) */
    .vinyl-card {
      position: absolute;
      width: min(45vh, 45vw, 280px);
      height: min(45vh, 45vw, 280px);
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,255,255,0.05);
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      border: 6px solid #1a1a1a;
    }
    .vinyl-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .vinyl-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18%;
      height: 18%;
      border-radius: 50%;
      background: radial-gradient(circle, #1a1a1a, #0a0a0a);
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }

    /* Posições 3D */
    .vinyl-card.center {
      transform: translateX(0) scale(1) rotateY(0deg);
      z-index: 10;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 6px rgba(255,255,255,0.08);
    }
    .vinyl-card.left {
      transform: translateX(-140%) scale(0.85) rotateY(35deg);
      z-index: 5;
      opacity: 0.7;
    }
    .vinyl-card.right {
      transform: translateX(140%) scale(0.85) rotateY(-35deg);
      z-index: 5;
      opacity: 0.7;
    }
    .vinyl-card.far-left {
      transform: translateX(-240%) scale(0.55) rotateY(45deg);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
    }
    .vinyl-card.far-right {
      transform: translateX(240%) scale(0.55) rotateY(-45deg);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
    }

    /* Nome do álbum/artista */
    #album-title {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 80%;
    }
    #album-title h2 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 700;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    #album-title p {
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    /* Botão tocar */
    #play-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 12px 32px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 20px rgba(29,185,84,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #play-btn:hover {
      transform: translateX(-50%) scale(1.05);
    }

    /* Detalhes do álbum (página de faixas) */
    #album-detail {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 80px 24px 40px;
      overflow-y: auto;
    }
    #album-detail.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 800px;
      margin: 0 auto 32px;
    }
    .detail-cover {
      width: 160px;
      height: 160px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }
    .detail-info {
      flex: 1;
      min-width: 200px;
    }
    .detail-info .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 4px;
    }
    .detail-info h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .detail-info .artist-name {
      font-size: 18px;
      color: #ddd;
      margin-bottom: 8px;
    }
    .detail-info .meta {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }
    .detail-info .meta span {
      margin-right: 16px;
    }
    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-actions button {
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 10px 24px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .detail-actions button:hover {
      background: #1ed760;
    }
    .detail-actions .secondary {
      background: transparent;
      border: 1px solid #555;
      color: #ddd;
    }
    .detail-actions .secondary:hover {
      background: #222;
      border-color: #888;
    }

    .tracklist {
      max-width: 800px;
      margin: 0 auto;
    }
    .tracklist h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ddd;
    }
    .track-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      font-size: 14px;
    }
    .track-item:last-child {
      border-bottom: none;
    }
    .track-item .track-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .track-item .track-number {
      color: #666;
      font-size: 12px;
      width: 24px;
      text-align: right;
    }
    .track-item .track-name {
      font-weight: 500;
    }
    .track-item .track-feat {
      font-size: 12px;
      color: #888;
      margin-left: 4px;
    }
    .track-item .track-duration {
      color: #666;
      font-size: 12px;
    }
    .track-item .explicit {
      color: #888;
      font-size: 10px;
      background: #222;
      padding: 0 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      background: none;
      border: none;
      padding: 0;
    }
    .back-btn:hover {
      color: white;
    }

    /* Modal de configurações */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
      padding: 24px;
    }
    #settings-modal.open {
      display: flex;
    }
    .settings-card {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .settings-card h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .settings-card label {
      display: block;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    .settings-card select {
      width: 100%;
      padding: 10px 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
    }
    .settings-card .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .settings-card .btn-row button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-card .save-btn {
      background: #1db954;
      color: #fff;
    }
    .settings-card .save-btn:hover {
      background: #1ed760;
    }
    .settings-card .close-btn {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }
    .settings-card .close-btn:hover {
      background: #222;
    }
    .settings-card .logout-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #ff4444;
      border-radius: 12px;
      color: #ff4444;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-card .logout-btn:hover {
      background: #ff4444;
      color: #fff;
    }

    @media (max-width: 768px) {
      .vinyl-card { width: min(35vh, 35vw, 200px); height: min(35vh, 35vw, 200px); }
      .vinyl-card.left { transform: translateX(-120%) scale(0.85) rotateY(35deg); }
      .vinyl-card.right { transform: translateX(120%) scale(0.85) rotateY(-35deg); }
      .vinyl-card.far-left { transform: translateX(-200%) scale(0.55) rotateY(45deg); }
      .vinyl-card.far-right { transform: translateX(200%) scale(0.55) rotateY(-45deg); }
      #album-title { bottom: 80px; }
      #album-title h2 { font-size: 20px; }
      #album-title p { font-size: 14px; }
      .detail-header { flex-direction: column; align-items: center; text-align: center; }
      .detail-cover { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>

  <!-- Fundo Apple Music -->
  <div id="album-bg"></div>

  <!-- Header -->
  <header>
    <h1>🎵 Discfy</h1>
    <div class="header-actions">
      <button id="settings-btn" title="Configurações">⚙️</button>
    </div>
  </header>

  <!-- Login -->
  <div id="login-overlay">
    <h2>Discfy</h2>
    <p>Seus álbuns do Spotify em um carrossel 3D com fundo imersivo.</p>
    <button id="login-btn">Entrar com Spotify</button>
  </div>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Carregando seus álbuns...</p>
  </div>

  <!-- Carrossel -->
  <div id="carousel-container">
    <div id="carousel-track"></div>
  </div>

  <!-- Nome do álbum/artista -->
  <div id="album-title">
    <h2 id="album-name"></h2>
    <p id="artist-name"></p>
  </div>

  <!-- Botão tocar -->
  <button id="play-btn">▶ Ouvir no Spotify</button>

  <!-- Detalhes do álbum -->
  <div id="album-detail">
    <button class="back-btn" id="detail-back-btn">← Voltar</button>
    <div class="detail-header" id="detail-header"></div>
    <div class="tracklist" id="detail-tracklist"></div>
  </div>

  <!-- Configurações -->
  <div id="settings-modal">
    <div class="settings-card">
      <h3>⚙️ Configurações</h3>
      <label>Ordenar por</label>
      <select id="sort-order">
        <option value="added">Data de adição</option>
        <option value="name">Nome do álbum</option>
        <option value="artist">Nome do artista</option>
      </select>
      <label>Tamanho do vinil</label>
      <select id="vinyl-size">
        <option value="large">Grande</option>
        <option value="medium" selected>Médio</option>
        <option value="small">Pequeno</option>
      </select>
      <div class="btn-row">
        <button class="save-btn" id="settings-save">Salvar</button>
        <button class="close-btn" id="settings-close">Fechar</button>
      </div>
      <button class="logout-btn" id="logout-btn">Sair da conta</button>
    </div>
  </div>

  <script>
    // CONFIGURAÇÕES
    const CLIENT_ID = 'f7df44e728f54415b22b3cd561dbdfdb';
    const REDIRECT_URI = 'https://akiradv.github.io/discfy/';

    let accessToken = localStorage.getItem('spotify_access_token');
    let albums = [];
    let currentIndex = 0;
    let vinylSize = 'medium';
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    let touchStartTime = 0;

    // Elementos
    const loginOverlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const track = document.getElementById('carousel-track');
    const albumName = document.getElementById('album-name');
    const artistName = document.getElementById('artist-name');
    const playBtn = document.getElementById('play-btn');
    const bg = document.getElementById('album-bg');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsClose = document.getElementById('settings-close');
    const settingsSave = document.getElementById('settings-save');
    const logoutBtn = document.getElementById('logout-btn');
    const sortSelect = document.getElementById('sort-order');
    const sizeSelect = document.getElementById('vinyl-size');
    const detailView = document.getElementById('album-detail');
    const detailHeader = document.getElementById('detail-header');
    const detailTracklist = document.getElementById('detail-tracklist');
    const detailBackBtn = document.getElementById('detail-back-btn');

    // ===========================
    // AUTENTICAÇÃO
    // ===========================
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function startLogin() {
      const verifier = generateCodeVerifier();
      localStorage.setItem('code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${REDIRECT_URI}&code_challenge_method=S256&code_challenge=${challenge}&scope=user-library-read`;
      window.location.href = authUrl;
    }

    async function handleRedirect() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (!code) return false;

      const verifier = localStorage.getItem('code_verifier');
      if (!verifier) return false;

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (data.access_token) {
        localStorage.setItem('spotify_access_token', data.access_token);
        window.history.replaceState({}, document.title, REDIRECT_URI);
        return true;
      }
      return false;
    }

    // ===========================
    // API DO SPOTIFY
    // ===========================
    async function fetchAllAlbums(token) {
      let all = [];
      let next = 'https://api.spotify.com/v1/me/albums?limit=50';
      while (next) {
        const res = await fetch(next, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('spotify_access_token');
          location.reload();
          return [];
        }
        const data = await res.json();
        all = all.concat(data.items);
        next = data.next;
      }
      return all;
    }

    async function fetchAlbumDetails(token, albumId) {
      const res = await fetch(`https://api.spotify.com/v1/albums/${albumId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      return res.json();
    }

    // ===========================
    // EXTRAIR COR DOMINANTE
    // ===========================
    function getDominantColor(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = imageUrl;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 1;
          canvas.height = 1;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 1, 1);
          const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
          resolve({ r, g, b });
        };
        img.onerror = () => resolve({ r: 29, g: 185, b: 84 });
      });
    }

    // ===========================
    // RENDERIZAR CARROSSEL
    // ===========================
    function getVinylSize() {
      const s = vinylSize === 'large' ? 1.2 : vinylSize === 'small' ? 0.8 : 1;
      return `min(${35 * s}vh, ${35 * s}vw, ${220 * s}px)`;
    }

    function renderCarousel(albumList) {
      track.innerHTML = '';
      albumList.forEach((item, index) => {
        const album = item.album;
        const image = album.images[0]?.url || '';
        const card = document.createElement('div');
        card.className = 'vinyl-card';
        card.dataset.index = index;
        card.style.width = getVinylSize();
        card.style.height = getVinylSize();
        card.innerHTML = `<img src="${image}" alt="${album.name}" loading="lazy" />`;
        card.addEventListener('click', () => {
          if (index === currentIndex) {
            openAlbumDetail(album.id);
          } else {
            goTo(index);
          }
        });
        track.appendChild(card);
      });
      updateCarousel(false);
      updateInfo();
      updateBackground();
    }

    function updateCarousel(animate = true) {
      const cards = track.querySelectorAll('.vinyl-card');
      cards.forEach((card, index) => {
        const offset = index - currentIndex;
        card.className = 'vinyl-card';
        if (offset === 0) card.classList.add('center');
        else if (offset === -1) card.classList.add('left');
        else if (offset === 1) card.classList.add('right');
        else if (offset === -2) card.classList.add('far-left');
        else if (offset === 2) card.classList.add('far-right');
        else {
          card.style.display = 'none';
          return;
        }
        card.style.display = 'block';
        card.style.width = getVinylSize();
        card.style.height = getVinylSize();
      });
    }

    function updateInfo() {
      if (albums.length === 0) return;
      const album = albums[currentIndex].album;
      albumName.textContent = album.name;
      artistName.textContent = album.artists[0]?.name || '';
      playBtn.onclick = () => window.open(`https://open.spotify.com/album/${album.id}`, '_blank');
    }

    async function updateBackground() {
      if (albums.length === 0) return;
      const img = albums[currentIndex].album.images[0]?.url;
      if (img) bg.style.backgroundImage = `url(${img})`;
    }

    // ===========================
    // NAVEGAÇÃO
    // ===========================
    function goTo(index) {
      if (index < 0) index = albums.length - 1;
      if (index >= albums.length) index = 0;
      currentIndex = index;
      updateCarousel(true);
      updateInfo();
      updateBackground();
    }

    // ===========================
    // ARRASTAR (CORRIGIDO)
    // ===========================
    const container = document.getElementById('carousel-container');

    function onDragStart(e) {
      isDragging = true;
      const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startX = x;
      currentX = x;
      touchStartTime = Date.now();
      track.style.transition = 'none';
    }

    function onDragMove(e) {
      if (!isDragging) return;
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      currentX = x;
      const delta = (currentX - startX) / window.innerWidth * 100;
      const offset = -currentIndex * 100 + delta;
      track.style.transform = `translateX(${offset}%)`;
    }

    function onDragEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      const delta = (currentX - startX) / window.innerWidth * 100;
      const elapsed = Date.now() - touchStartTime;
      const speed = Math.abs(delta) / (elapsed / 1000);

      let threshold = 15;
      if (speed > 80) threshold = 5;

      if (Math.abs(delta) > threshold) {
        if (delta < 0) goTo(currentIndex + 1);
        else goTo(currentIndex - 1);
      } else {
        updateCarousel(true);
      }
      track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    }

    container.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    container.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('touchmove', onDragMove, { passive: true });
    window.addEventListener('touchend', onDragEnd, { passive: true });

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
      if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    });

    // ===========================
    // DETALHES DO ÁLBUM
    // ===========================
    async function openAlbumDetail(albumId) {
      detailView.classList.remove('active');
      detailView.style.display = 'block';

      try {
        const album = await fetchAlbumDetails(accessToken, albumId);
        const image = album.images[0]?.url || '';
        const color = await getDominantColor(image);

        const totalMinutes = Math.floor(album.tracks.items.reduce((sum, t) => sum + t.duration_ms, 0) / 60000);
        const trackCount = album.tracks.items.length;

        let artistsHtml = album.artists.map(a => a.name).join(', ');
        let feats = [];
        album.tracks.items.forEach(t => {
          t.artists.forEach(a => {
            if (!album.artists.some(ma => ma.id === a.id) && !feats.some(f => f.id === a.id)) {
              feats.push(a);
            }
          });
        });
        let featText = feats.length ? ` (feat. ${feats.map(f => f.name).join(', ')})` : '';

        detailHeader.innerHTML = `
          <img class="detail-cover" src="${image}" alt="${album.name}" style="border: 2px solid rgb(${color.r},${color.g},${color.b});" />
          <div class="detail-info">
            <div class="label">Álbum</div>
            <h2 style="color: rgb(${color.r},${color.g},${color.b});">${album.name}</h2>
            <div class="artist-name">${artistsHtml}${featText}</div>
            <div class="meta">
              <span>${album.release_date?.split('-')[0] || ''}</span>
              <span>${trackCount} músicas</span>
              <span>${totalMinutes} min</span>
            </div>
            <div class="detail-actions">
              <button onclick="window.open('https://open.spotify.com/album/${album.id}', '_blank')">▶ Ouvir no Spotify</button>
              <button class="secondary" onclick="closeAlbumDetail()">Voltar</button>
            </div>
          </div>
        `;

        detailTracklist.innerHTML = '<h3>Faixas</h3>';
        album.tracks.items.forEach((track, index) => {
          const minutes = Math.floor(track.duration_ms / 60000);
          const seconds = ((track.duration_ms % 60000) / 1000).toFixed(0).padStart(2, '0');
          const featArtists = track.artists.filter(a => !album.artists.some(ma => ma.id === a.id));
          const featText2 = featArtists.length ? ` (feat. ${featArtists.map(a => a.name).join(', ')})` : '';
          const explicit = track.explicit ? '<span class="explicit">E</span>' : '';

          const div = document.createElement('div');
          div.className = 'track-item';
          div.innerHTML = `
            <div class="track-left">
              <span class="track-number">${index + 1}</span>
              <span class="track-name">${track.name}</span>
              ${featText2}
              ${explicit}
            </div>
            <span class="track-duration">${minutes}:${seconds}</span>
          `;
          detailTracklist.appendChild(div);
        });

        setTimeout(() => detailView.classList.add('active'), 10);
      } catch (err) {
        detailTracklist.innerHTML = '<p style="color:#ff4444;">Erro ao carregar detalhes.</p>';
      }
    }

    function closeAlbumDetail() {
      detailView.classList.remove('active');
      setTimeout(() => {
        detailView.style.display = 'none';
      }, 400);
    }

    detailBackBtn.addEventListener('click', closeAlbumDetail);

    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    settingsBtn.addEventListener('click', () => settingsModal.classList.add('open'));
    settingsClose.addEventListener('click', () => settingsModal.classList.remove('open'));
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.classList.remove('open');
    });

    settingsSave.addEventListener('click', () => {
      const sort = sortSelect.value;
      const size = sizeSelect.value;
      vinylSize = size;

      let sorted = [...albums];
      if (sort === 'name') {
        sorted.sort((a, b) => a.album.name.localeCompare(b.album.name));
      } else if (sort === 'artist') {
        sorted.sort((a, b) => a.album.artists[0]?.name.localeCompare(b.album.artists[0]?.name || ''));
      }
      albums = sorted;
      currentIndex = 0;
      renderCarousel(albums);
      settingsModal.classList.remove('open');
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('spotify_access_token');
      location.reload();
    });

    // ===========================
    // INICIALIZAÇÃO
    // ===========================
    (async function init() {
      loginBtn.addEventListener('click', startLogin);

      if (window.location.search.includes('code')) {
        const success = await handleRedirect();
        if (success) accessToken = localStorage.getItem('spotify_access_token');
      }

      if (accessToken) {
        loginOverlay.style.display = 'none';
        loadingScreen.classList.add('active');

        const rawAlbums = await fetchAllAlbums(accessToken);
        albums = rawAlbums;
        renderCarousel(albums);

        loadingScreen.classList.remove('active');
      } else {
        loginOverlay.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
