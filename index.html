<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Discfy - Sua Coleção em Vinyl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* FUNDO ESTILO APPLE MUSIC */
    #album-bg {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(60px) saturate(1.2);
      transition: background-image 0.8s ease;
    }
    
    /* Gradiente estilo Apple Music */
    #album-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, 
        rgba(0,0,0,0.4) 0%, 
        rgba(0,0,0,0.2) 40%, 
        rgba(0,0,0,0.6) 100%
      );
    }
    
    #album-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, 
        transparent 0%, 
        rgba(0,0,0,0.4) 70%, 
        rgba(0,0,0,0.8) 100%
      );
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    header h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #1db954 0%, #1ed760 50%, #53f782 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    
    header .header-actions { display: flex; gap: 12px; }
    header button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }
    header button:hover { 
      background: rgba(255,255,255,0.2); 
      transform: scale(1.05);
    }

    /* Login */
    #login-overlay {
      position: fixed; 
      inset: 0; 
      z-index: 200;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      text-align: center; 
      padding: 24px;
    }
    
    #login-overlay h2 {
      font-size: 56px; 
      font-weight: 800;
      background: linear-gradient(135deg, #1db954, #53f782);
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }
    
    #login-overlay p { 
      color: #888; 
      font-size: 18px; 
      max-width: 400px; 
      margin-bottom: 40px;
      line-height: 1.5;
    }
    
    #login-overlay button {
      background: linear-gradient(135deg, #1db954, #1ed760);
      border: none; 
      border-radius: 30px;
      padding: 16px 48px; 
      color: #fff; 
      font-weight: 700; 
      font-size: 18px; 
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(29,185,84,0.4);
      transition: all 0.3s ease;
    }
    
    #login-overlay button:hover { 
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 40px rgba(29,185,84,0.5);
    }

    /* Loading */
    #loading-screen {
      position: fixed; 
      inset: 0; 
      z-index: 150;
      display: none; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      background: rgba(0,0,0,0.9); 
      backdrop-filter: blur(20px);
    }
    
    #loading-screen.active { display: flex; }
    
    .spinner {
      width: 60px; 
      height: 60px;
      border: 4px solid rgba(29,185,84,0.1); 
      border-top: 4px solid #1db954; 
      border-radius: 50%;
      animation: spin 1s linear infinite; 
      margin-bottom: 24px;
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    /* CARROSSEL */
    #carousel-container {
      position: fixed; 
      inset: 0; 
      z-index: 1;
      display: flex; 
      align-items: center; 
      justify-content: center;
      perspective: 1500px; 
      touch-action: none;
      overflow: hidden;
    }

    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-card {
      position: absolute;
      width: min(35vh, 35vw, 280px);
      height: min(35vh, 35vw, 280px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform-style: preserve-3d;
    }
    
    .album-card img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    .album-card.center {
      transform: translateX(0) scale(1) rotateY(0deg);
      z-index: 10;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.1);
    }
    
    .album-card.left {
      transform: translateX(-120%) scale(0.8) rotateY(30deg);
      z-index: 5;
      opacity: 0.6;
      filter: brightness(0.7);
    }
    
    .album-card.right {
      transform: translateX(120%) scale(0.8) rotateY(-30deg);
      z-index: 5;
      opacity: 0.6;
      filter: brightness(0.7);
    }
    
    .album-card.far-left {
      transform: translateX(-220%) scale(0.6) rotateY(40deg);
      z-index: 1;
      opacity: 0.3;
      filter: brightness(0.5);
      pointer-events: none;
    }
    
    .album-card.far-right {
      transform: translateX(220%) scale(0.6) rotateY(-40deg);
      z-index: 1;
      opacity: 0.3;
      filter: brightness(0.5);
      pointer-events: none;
    }
    
    .album-card.hidden {
      display: none;
    }

    /* Informações do álbum */
    #album-info {
      position: fixed; 
      bottom: 120px; 
      left: 50%; 
      transform: translateX(-50%);
      z-index: 10; 
      text-align: center; 
      width: 90%;
      max-width: 500px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    
    #album-info h2 {
      font-size: clamp(28px, 5vw, 42px); 
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    
    #album-info p {
      font-size: clamp(16px, 2.5vw, 20px); 
      color: rgba(255,255,255,0.85);
      font-weight: 500;
    }

    /* Botão Play */
    #play-btn {
      position: fixed; 
      bottom: 40px; 
      left: 50%; 
      transform: translateX(-50%);
      z-index: 10; 
      background: linear-gradient(135deg, #1db954, #1ed760);
      border: none; 
      border-radius: 35px;
      padding: 16px 48px; 
      color: #fff; 
      font-weight: 700; 
      font-size: 17px;
      cursor: pointer; 
      box-shadow: 0 8px 30px rgba(29,185,84,0.5);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    #play-btn:hover { 
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 12px 40px rgba(29,185,84,0.6);
    }
    
    #play-btn:active {
      transform: translateX(-50%) scale(0.98);
    }

    /* Detalhes do álbum */
    #album-detail {
      display: none; 
      position: fixed; 
      inset: 0; 
      z-index: 50;
      background: rgba(0,0,0,0.95); 
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 100px 24px 40px; 
      overflow-y: auto;
    }
    
    #album-detail.active { 
      display: block; 
      animation: fadeIn 0.5s ease; 
    }
    
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .detail-header { 
      display: flex; 
      gap: 32px; 
      align-items: flex-start; 
      flex-wrap: wrap; 
      max-width: 800px; 
      margin: 0 auto 40px; 
    }
    
    .detail-cover { 
      width: 200px; 
      height: 200px; 
      border-radius: 16px; 
      object-fit: cover; 
      box-shadow: 0 12px 40px rgba(0,0,0,0.8); 
    }
    
    .detail-info { 
      flex: 1; 
      min-width: 250px; 
    }
    
    .detail-info .label { 
      font-size: 12px; 
      text-transform: uppercase; 
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    
    .detail-info h2 { 
      font-size: 36px; 
      font-weight: 800; 
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    
    .detail-info .artist-name { 
      font-size: 20px; 
      color: #fff; 
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .detail-info .meta { 
      font-size: 14px; 
      color: #888;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .detail-actions { 
      display: flex; 
      gap: 12px; 
      flex-wrap: wrap;
      margin-top: 24px;
    }
    
    .detail-actions button { 
      background: linear-gradient(135deg, #1db954, #1ed760);
      border: none; 
      border-radius: 25px; 
      padding: 12px 32px; 
      color: white; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .detail-actions button:hover {
      transform: scale(1.05);
    }
    
    .detail-actions .secondary { 
      background: transparent; 
      border: 1px solid rgba(255,255,255,0.3); 
      color: #fff; 
    }
    
    .tracklist { 
      max-width: 800px; 
      margin: 0 auto; 
    }
    
    .tracklist h3 { 
      font-size: 20px; 
      font-weight: 700; 
      margin-bottom: 20px; 
      color: #fff; 
    }
    
    .track-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 14px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.1); 
      font-size: 15px;
      transition: background 0.2s;
    }
    
    .track-item:hover {
      background: rgba(255,255,255,0.03);
      padding-left: 8px;
      padding-right: 8px;
      border-radius: 8px;
    }
    
    .track-item .track-left { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
    }
    
    .track-item .track-number { 
      color: #666; 
      width: 28px; 
      text-align: right;
      font-weight: 500;
    }
    
    .track-item .track-name { 
      font-weight: 500;
      color: #fff;
    }
    
    .track-item .track-feat { 
      font-size: 13px; 
      color: #888; 
      margin-left: 6px; 
    }
    
    .track-item .track-duration { 
      color: #888;
      font-variant-numeric: tabular-nums;
    }
    
    .track-item .explicit { 
      color: #888; 
      font-size: 10px; 
      background: rgba(255,255,255,0.1); 
      padding: 2px 6px; 
      border-radius: 4px; 
      margin-left: 8px;
      font-weight: 700;
    }
    
    .back-btn { 
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px; 
      color: #fff; 
      cursor: pointer; 
      font-size: 15px;
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    
    .back-btn:hover { 
      background: rgba(255,255,255,0.2); 
    }

    /* Configurações */
    #settings-modal {
      position: fixed; 
      inset: 0; 
      z-index: 300;
      display: none; 
      align-items: center; 
      justify-content: center;
      background: rgba(0,0,0,0.8); 
      backdrop-filter: blur(20px);
      padding: 24px;
    }
    
    #settings-modal.open { display: flex; }
    
    .settings-card {
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border-radius: 28px; 
      padding: 36px;
      max-width: 450px; 
      width: 100%; 
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    .settings-card h3 { 
      font-size: 26px; 
      font-weight: 800; 
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }
    
    .settings-card label { 
      display: block; 
      font-size: 14px; 
      color: #aaa; 
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .settings-card select { 
      width: 100%; 
      padding: 12px 16px; 
      background: rgba(0,0,0,0.4); 
      border: 1px solid rgba(255,255,255,0.15); 
      border-radius: 14px; 
      color: #fff; 
      font-size: 15px;
      cursor: pointer;
    }
    
    .settings-card .btn-row { 
      display: flex; 
      gap: 12px; 
      margin-top: 28px; 
    }
    
    .settings-card .btn-row button { 
      flex: 1; 
      padding: 14px; 
      border: none; 
      border-radius: 14px; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .settings-card .save-btn { 
      background: linear-gradient(135deg, #1db954, #1ed760);
      color: #fff; 
    }
    
    .settings-card .save-btn:hover {
      transform: scale(1.02);
    }
    
    .settings-card .close-btn { 
      background: transparent; 
      color: #888; 
      border: 1px solid rgba(255,255,255,0.2); 
    }
    
    .settings-card .close-btn:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }
    
    .settings-card .logout-btn { 
      margin-top: 16px; 
      width: 100%; 
      padding: 12px; 
      background: transparent; 
      border: 1px solid #ff4444; 
      border-radius: 14px; 
      color: #ff4444; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .settings-card .logout-btn:hover {
      background: rgba(255,68,68,0.1);
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .album-card { 
        width: min(32vh, 40vw, 220px); 
        height: min(32vh, 40vw, 220px); 
      }
      
      .album-card.left { 
        transform: translateX(-100%) scale(0.75) rotateY(30deg); 
      }
      
      .album-card.right { 
        transform: translateX(100%) scale(0.75) rotateY(-30deg); 
      }
      
      .album-card.far-left { 
        transform: translateX(-180%) scale(0.55) rotateY(40deg); 
      }
      
      .album-card.far-right { 
        transform: translateX(180%) scale(0.55) rotateY(-40deg); 
      }
      
      #album-info { 
        bottom: 100px; 
      }
      
      #album-info h2 { 
        font-size: 24px; 
      }
      
      #album-info p { 
        font-size: 16px; 
      }
      
      .detail-header { 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
      }
      
      .detail-cover {
        width: 160px;
        height: 160px;
      }
    }
  </style>
</head>
<body>

  <!-- Fundo estilo Apple Music -->
  <div id="album-bg"></div>

  <header>
    <h1>🎵 Discfy</h1>
    <div class="header-actions">
      <button id="settings-btn" title="Configurações">⚙️</button>
    </div>
  </header>

  <!-- Login -->
  <div id="login-overlay">
    <h2>Discfy</h2>
    <p>Sua coleção de álbuns do Spotify em um carrossel 3D estilo vinyl.</p>
    <button id="login-btn">Conectar com Spotify</button>
  </div>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p style="color: #888; font-size: 16px;">Carregando sua biblioteca...</p>
  </div>

  <!-- Carrossel -->
  <div id="carousel-container">
    <div id="carousel-track"></div>
  </div>

  <div id="album-info">
    <h2 id="album-name"></h2>
    <p id="artist-name"></p>
  </div>

  <button id="play-btn">
    <span>▶</span>
    <span>Ouvir no Spotify</span>
  </button>

  <!-- Detalhes -->
  <div id="album-detail">
    <button class="back-btn" id="detail-back-btn">← Voltar</button>
    <div class="detail-header" id="detail-header"></div>
    <div class="tracklist" id="detail-tracklist"></div>
  </div>

  <!-- Configurações -->
  <div id="settings-modal">
    <div class="settings-card">
      <h3>⚙️ Configurações</h3>
      
      <label>Ordenar por</label>
      <select id="sort-order">
        <option value="added">Data de adição</option>
        <option value="name">Nome do álbum</option>
        <option value="artist">Nome do artista</option>
        <option value="year">Ano de lançamento</option>
      </select>
      
      <label>Tamanho dos vinyls</label>
      <select id="vinyl-size">
        <option value="large">Grande</option>
        <option value="medium" selected>Médio</option>
        <option value="small">Pequeno</option>
      </select>
      
      <div class="btn-row">
        <button class="save-btn" id="settings-save">Salvar</button>
        <button class="close-btn" id="settings-close">Cancelar</button>
      </div>
      
      <button class="logout-btn" id="logout-btn">Sair da conta</button>
    </div>
  </div>

  <script>
    // CONFIGURAÇÕES - SUBSTITUA PELO SEU CLIENT ID
    const CLIENT_ID = 'f7df44e728f54415b22b3cd561dbdfdb';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    let accessToken = localStorage.getItem('spotify_access_token');
    let albums = [];
    let currentIndex = 0;
    let vinylSize = 'medium';
    let isAnimating = false;

    // Elementos do DOM
    const loginOverlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const track = document.getElementById('carousel-track');
    const albumNameEl = document.getElementById('album-name');
    const artistNameEl = document.getElementById('artist-name');
    const playBtn = document.getElementById('play-btn');
    const bg = document.getElementById('album-bg');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsClose = document.getElementById('settings-close');
    const settingsSave = document.getElementById('settings-save');
    const logoutBtn = document.getElementById('logout-btn');
    const sortSelect = document.getElementById('sort-order');
    const sizeSelect = document.getElementById('vinyl-size');
    const detailView = document.getElementById('album-detail');
    const detailHeader = document.getElementById('detail-header');
    const detailTracklist = document.getElementById('detail-tracklist');
    const detailBackBtn = document.getElementById('detail-back-btn');

    // ===========================
    // AUTENTICAÇÃO SPOTIFY (PKCE)
    // ===========================
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function startLogin() {
      const verifier = generateCodeVerifier();
      localStorage.setItem('code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      
      const authUrl = new URL('https://accounts.spotify.com/authorize');
      authUrl.searchParams.set('client_id', CLIENT_ID);
      authUrl.searchParams.set('response_type', 'code');
      authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
      authUrl.searchParams.set('code_challenge_method', 'S256');
      authUrl.searchParams.set('code_challenge', challenge);
      authUrl.searchParams.set('scope', 'user-library-read');
      
      window.location.href = authUrl.toString();
    }

    async function handleRedirect() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      
      if (!code) return false;
      
      const verifier = localStorage.getItem('code_verifier');
      if (!verifier) return false;
      
      try {
        const res = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: new URLSearchParams({
            client_id: CLIENT_ID,
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: REDIRECT_URI,
            code_verifier: verifier
          })
        });
        
        const data = await res.json();
        
        if (data.access_token) {
          localStorage.setItem('spotify_access_token', data.access_token);
          localStorage.removeItem('code_verifier');
          window.history.replaceState({}, document.title, REDIRECT_URI);
          return true;
        }
      } catch (error) {
        console.error('Erro na autenticação:', error);
      }
      
      return false;
    }

    // ===========================
    // API SPOTIFY
    // ===========================
    async function fetchAllAlbums(token) {
      let all = [];
      let next = 'https://api.spotify.com/v1/me/albums?limit=50&market=BR';
      
      while (next) {
        try {
          const res = await fetch(next, { 
            headers: { 'Authorization': `Bearer ${token}` } 
          });
          
          if (res.status === 401) {
            localStorage.removeItem('spotify_access_token');
            location.reload();
            return [];
          }
          
          const data = await res.json();
          all = all.concat(data.items);
          next = data.next;
        } catch (error) {
          console.error('Erro ao buscar álbuns:', error);
          break;
        }
      }
      
      return all;
    }

    async function fetchAlbumDetails(token, albumId) {
      try {
        const res = await fetch(`https://api.spotify.com/v1/albums/${albumId}?market=BR`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        return await res.json();
      } catch (error) {
        console.error('Erro ao buscar detalhes:', error);
        return null;
      }
    }

    // ===========================
    // CARROSSEL
    // ===========================
    function getSize() {
      const sizes = {
        large: 1.2,
        medium: 1.0,
        small: 0.8
      };
      const multiplier = sizes[vinylSize] || 1.0;
      return `min(${35 * multiplier}vh, ${35 * multiplier}vw, ${280 * multiplier}px)`;
    }

    function getPositionClass(index) {
      const diff = index - currentIndex;
      if (diff === 0) return 'center';
      if (diff === -1) return 'left';
      if (diff === 1) return 'right';
      if (diff === -2) return 'far-left';
      if (diff === 2) return 'far-right';
      return 'hidden';
    }

    function renderCarousel(list) {
      track.innerHTML = '';
      
      if (list.length === 0) {
        track.innerHTML = '<p style="color: #888; text-align: center;">Nenhum álbum encontrado</p>';
        return;
      }
      
      list.forEach((item, index) => {
        const img = item.album.images[0]?.url || '';
        const card = document.createElement('div');
        card.className = 'album-card ' + getPositionClass(index);
        card.dataset.index = index;
        card.style.width = getSize();
        card.style.height = getSize();
        
        const imgEl = document.createElement('img');
        imgEl.src = img;
        imgEl.alt = item.album.name;
        imgEl.loading = 'lazy';
        card.appendChild(imgEl);
        
        card.addEventListener('click', () => {
          if (index === currentIndex) {
            openAlbumDetail(item.album.id);
          } else {
            goTo(index);
          }
        });
        
        track.appendChild(card);
      });
      
      updateInfo();
      updateBg();
    }

    function updatePositions(animate = true) {
      const cards = track.querySelectorAll('.album-card');
      cards.forEach((card) => {
        const index = parseInt(card.dataset.index);
        const className = getPositionClass(index);
        card.className = 'album-card ' + className;
        card.style.transition = animate ? 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none';
        card.style.width = getSize();
        card.style.height = getSize();
      });
    }

    function updateInfo() {
      if (!albums.length) return;
      const album = albums[currentIndex].album;
      albumNameEl.textContent = album.name;
      artistNameEl.textContent = album.artists.map(a => a.name).join(', ');
      
      playBtn.onclick = () => {
        window.open(`https://open.spotify.com/album/${album.id}`, '_blank');
      };
    }

    function updateBg() {
      if (!albums.length) return;
      const img = albums[currentIndex].album.images[0]?.url;
      if (img) {
        bg.style.backgroundImage = `url(${img})`;
      }
    }

    function goTo(index) {
      if (isAnimating) return;
      if (index < 0) index = albums.length - 1;
      if (index >= albums.length) index = 0;
      if (index === currentIndex) return;
      
      isAnimating = true;
      currentIndex = index;
      updatePositions(true);
      updateInfo();
      updateBg();
      
      setTimeout(() => { 
        isAnimating = false; 
      }, 650);
    }

    // ===========================
    // GESTOS DE ARRASTAR
    // ===========================
    let startX = 0;
    let currentX = 0;
    let isDragging = false;
    const container = document.getElementById('carousel-container');

    function onStart(e) {
      if (detailView.style.display === 'block') return;
      if (isAnimating) return;
      
      isDragging = true;
      const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startX = x;
      currentX = x;
      
      const cards = track.querySelectorAll('.album-card');
      cards.forEach(c => c.style.transition = 'none');
    }

    function onMove(e) {
      if (!isDragging) return;
      
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      currentX = x;
      const delta = (currentX - startX) / window.innerWidth;
      
      const cards = track.querySelectorAll('.album-card');
      cards.forEach((card) => {
        const index = parseInt(card.dataset.index);
        const diff = index - currentIndex;
        const rawPos = diff + delta;
        
        let tx = 0, scale = 1, rotateY = 0, zIndex = 1, opacity = 1;
        
        if (Math.abs(rawPos) > 2.5) {
          card.style.display = 'none';
          return;
        }
        card.style.display = 'block';
        
        if (rawPos >= -0.5 && rawPos <= 0.5) {
          tx = 0; scale = 1; rotateY = 0; zIndex = 10; opacity = 1;
        } else if (rawPos > 0.5 && rawPos <= 1.5) {
          const p = (rawPos - 0.5);
          tx = 120 * p;
          scale = 1 - (0.2 * p);
          rotateY = -30 * p;
          zIndex = 5;
          opacity = 1 - (0.4 * p);
        } else if (rawPos < -0.5 && rawPos >= -1.5) {
          const p = (-rawPos - 0.5);
          tx = -120 * p;
          scale = 1 - (0.2 * p);
          rotateY = 30 * p;
          zIndex = 5;
          opacity = 1 - (0.4 * p);
        } else if (rawPos > 1.5 && rawPos <= 2.5) {
          const p = (rawPos - 1.5);
          tx = 120 + (100 * p);
          scale = 0.8 - (0.2 * p);
          rotateY = -30 - (10 * p);
          zIndex = 1;
          opacity = 0.6 - (0.3 * p);
        } else if (rawPos < -1.5 && rawPos >= -2.5) {
          const p = (-rawPos - 1.5);
          tx = -120 - (100 * p);
          scale = 0.8 - (0.2 * p);
          rotateY = 30 + (10 * p);
          zIndex = 1;
          opacity = 0.6 - (0.3 * p);
        }
        
        card.style.transform = `translateX(${tx}%) scale(${scale}) rotateY(${rotateY}deg)`;
        card.style.zIndex = zIndex;
        card.style.opacity = Math.max(0, opacity);
      });
    }

    function onEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      
      const delta = (currentX - startX) / window.innerWidth;
      const cards = track.querySelectorAll('.album-card');
      cards.forEach(c => c.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)');
      
      if (Math.abs(delta) > 0.15) {
        if (delta < 0) {
          goTo(currentIndex + 1);
        } else {
          goTo(currentIndex - 1);
        }
      } else {
        updatePositions(true);
      }
    }

    // Event listeners de drag
    container.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    container.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('touchend', onEnd, { passive: true });

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
      if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    });

    // ===========================
    // DETALHES DO ÁLBUM
    // ===========================
    async function openAlbumDetail(id) {
      detailView.style.display = 'block';
      detailView.classList.remove('active');
      
      try {
        const album = await fetchAlbumDetails(accessToken, id);
        if (!album) throw new Error('Álbum não encontrado');
        
        const img = album.images[0]?.url || '';
        const totalMs = album.tracks.items.reduce((sum, t) => sum + t.duration_ms, 0);
        const totalMin = Math.floor(totalMs / 60000);
        
        detailHeader.innerHTML = `
          <img class="detail-cover" src="${img}" alt="${album.name}" />
          <div class="detail-info">
            <div class="label">Álbum</div>
            <h2>${album.name}</h2>
            <div class="artist-name">${album.artists.map(a => a.name).join(', ')}</div>
            <div class="meta">
              <span>${album.release_date?.split('-')[0] || 'N/A'}</span>
              <span>•</span>
              <span>${album.tracks.items.length} faixas</span>
              <span>•</span>
              <span>${totalMin} min</span>
            </div>
            <div class="detail-actions">
              <button onclick="window.open('https://open.spotify.com/album/${album.id}', '_blank')">
                ▶ Ouvir no Spotify
              </button>
              <button class="secondary" onclick="closeDetail()">Voltar</button>
            </div>
          </div>
        `;
        
        detailTracklist.innerHTML = '<h3>Faixas</h3>';
        album.tracks.items.forEach((t, i) => {
          const min = Math.floor(t.duration_ms / 60000);
          const sec = ((t.duration_ms % 60000) / 1000).toFixed(0).padStart(2, '0');
          const feat = t.artists.filter(a => !album.artists.some(ma => ma.id === a.id));
          const featText = feat.length ? ` (feat. ${feat.map(a => a.name).join(', ')})` : '';
          
          const div = document.createElement('div');
          div.className = 'track-item';
          div.innerHTML = `
            <div class="track-left">
              <span class="track-number">${i+1}</span>
              <span class="track-name">${t.name}${featText}</span>
              ${t.explicit ? '<span class="explicit">E</span>' : ''}
            </div>
            <span class="track-duration">${min}:${sec}</span>
          `;
          detailTracklist.appendChild(div);
        });
        
        setTimeout(() => detailView.classList.add('active'), 10);
      } catch (err) {
        console.error(err);
        detailTracklist.innerHTML = '<p style="color:#ff4444; text-align:center;">Erro ao carregar detalhes.</p>';
      }
    }

    function closeDetail() {
      detailView.classList.remove('active');
      setTimeout(() => { 
        detailView.style.display = 'none'; 
      }, 400);
    }

    detailBackBtn.addEventListener('click', closeDetail);

    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    settingsBtn.addEventListener('click', () => {
      settingsModal.classList.add('open');
    });
    
    settingsClose.addEventListener('click', () => {
      settingsModal.classList.remove('open');
    });
    
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.remove('open');
      }
    });

    settingsSave.addEventListener('click', () => {
      const sort = sortSelect.value;
      vinylSize = sizeSelect.value;
      
      let sorted = [...albums];
      
      if (sort === 'name') {
        sorted.sort((a, b) => a.album.name.localeCompare(b.album.name));
      } else if (sort === 'artist') {
        sorted.sort((a, b) => {
          const artistA = a.album.artists[0]?.name || '';
          const artistB = b.album.artists[0]?.name || '';
          return artistA.localeCompare(artistB);
        });
      } else if (sort === 'year') {
        sorted.sort((a, b) => {
          const yearA = parseInt(a.album.release_date?.split('-')[0]) || 0;
          const yearB = parseInt(b.album.release_date?.split('-')[0]) || 0;
          return yearB - yearA;
        });
      }
      // 'added' mantém a ordem original
      
      albums = sorted;
      currentIndex = 0;
      renderCarousel(albums);
      settingsModal.classList.remove('open');
    });

    logoutBtn.addEventListener('click', () => {
      if (confirm('Deseja realmente sair?')) {
        localStorage.removeItem('spotify_access_token');
        localStorage.removeItem('code_verifier');
        location.reload();
      }
    });

    // ===========================
    // INICIALIZAÇÃO
    // ===========================
    (async function init() {
      loginBtn.addEventListener('click', startLogin);
      
      // Verifica se tem código de auth na URL
      if (window.location.search.includes('code=')) {
        const success = await handleRedirect();
        if (success) {
          accessToken = localStorage.getItem('spotify_access_token');
        }
      }
      
      if (accessToken) {
        loginOverlay.style.display = 'none';
        loadingScreen.classList.add('active');
        
        try {
          const raw = await fetchAllAlbums(accessToken);
          albums = raw;
          
          if (albums.length === 0) {
            track.innerHTML = '<p style="color: #888; text-align: center; font-size: 18px;">Você ainda não salvou nenhum álbum.<br>Volte ao Spotify e salve alguns álbuns!</p>';
          } else {
            renderCarousel(albums);
          }
        } catch (error) {
          console.error('Erro:', error);
          track.innerHTML = '<p style="color: #ff4444; text-align: center;">Erro ao carregar álbuns. Tente novamente.</p>';
        }
        
        loadingScreen.classList.remove('active');
      } else {
        loginOverlay.style.display = 'flex';
      }
    })();
  </script>
</body>
