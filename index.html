<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <!-- SEO / Open Graph -->
  <title>Discfy - Seus álbuns em vinil imersivo</title>
  <meta name="description" content="Transforme seus álbuns do Spotify em uma experiência imersiva de vinil com partículas dinâmicas." />
  <meta property="og:title" content="Discfy - Seus álbuns em vinil" />
  <meta property="og:description" content="Navegue pelos seus álbuns do Spotify como vinis em tela cheia com fundo de partículas coloridas." />
  <meta property="og:image" content="https://akiradv.github.io/discfy/og-image.jpg" />
  <meta property="og:url" content="https://akiradv.github.io/discfy/" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Canvas de partículas (fundo) */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, #1a1a1a, #0a0a0a);
      transition: background 1s ease;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    header .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    header button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    header button:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }
    header button#settings-btn {
      font-size: 20px;
    }

    /* Tela de login */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      text-align: center;
      padding: 24px;
    }
    #login-overlay h2 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #login-overlay p {
      color: #aaa;
      font-size: 18px;
      max-width: 400px;
      margin-bottom: 32px;
    }
    #login-overlay button {
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 14px 40px;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 20px rgba(29,185,84,0.3);
    }
    #login-overlay button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(29,185,84,0.5);
    }

    /* Carrossel */
    #carousel-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      touch-action: none;
    }
    #carousel-track {
      display: flex;
      height: 100%;
      width: 100%;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    /* Vinil */
    .vinyl-wrapper {
      position: relative;
      width: min(70vh, 70vw, 400px);
      height: min(70vh, 70vw, 400px);
      border-radius: 50%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 6px rgba(255,255,255,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      flex-shrink: 0;
    }
    .vinyl-wrapper:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 80px rgba(0,0,0,0.9), 0 0 0 8px rgba(255,255,255,0.08);
    }
    .vinyl-wrapper .vinyl-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .vinyl-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14%;
      height: 14%;
      border-radius: 50%;
      background: radial-gradient(circle, #1a1a1a, #0a0a0a);
      transform: translate(-50%, -50%);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.1);
    }

    /* Info do álbum */
    .album-info {
      margin-top: 24px;
      text-align: center;
      z-index: 2;
      max-width: 80%;
    }
    .album-info h2 {
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 700;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    .album-info p {
      font-size: clamp(14px, 2vw, 20px);
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }
    .album-info .meta {
      font-size: clamp(12px, 1.5vw, 16px);
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }
    .album-info .meta span {
      margin: 0 8px;
    }

    /* Botão tocar */
    .play-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: #1db954;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(29,185,84,0.4);
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 30px rgba(29,185,84,0.6);
    }

    /* Controles de navegação */
    .nav-controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      gap: 20px;
      align-items: center;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .nav-controls button {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-controls button:hover {
      background: rgba(255,255,255,0.15);
    }
    .nav-controls .counter {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      min-width: 60px;
      text-align: center;
      font-weight: 500;
    }

    /* Modal de configurações */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
      padding: 24px;
    }
    #settings-modal.open {
      display: flex;
    }
    .settings-card {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .settings-card h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .settings-card label {
      display: block;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    .settings-card select, .settings-card input {
      width: 100%;
      padding: 10px 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }
    .settings-card select:focus, .settings-card input:focus {
      border-color: #1db954;
    }
    .settings-card .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .settings-card .btn-row button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-card .btn-row .save-btn {
      background: #1db954;
      color: #fff;
    }
    .settings-card .btn-row .save-btn:hover {
      background: #1ed760;
    }
    .settings-card .btn-row .close-btn {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }
    .settings-card .btn-row .close-btn:hover {
      background: #222;
    }
    .settings-card .logout-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #ff4444;
      border-radius: 12px;
      color: #ff4444;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-card .logout-btn:hover {
      background: #ff4444;
      color: #fff;
    }

    /* Loading */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    #loading-screen.active {
      display: flex;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #222;
      border-top: 4px solid #1db954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p {
      color: #aaa;
      font-size: 16px;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 18px; }
      .vinyl-wrapper { width: min(55vh, 55vw, 280px); height: min(55vh, 55vw, 280px); }
      .nav-controls { padding: 8px 16px; gap: 12px; bottom: 24px; }
      .nav-controls button { width: 36px; height: 36px; font-size: 16px; }
      .play-btn { width: 50px; height: 50px; font-size: 22px; bottom: 20px; right: 20px; }
      #login-overlay h2 { font-size: 32px; }
      .settings-card { padding: 24px; }
    }
    @media (max-width: 480px) {
      .vinyl-wrapper { width: min(45vh, 45vw, 200px); height: min(45vh, 45vw, 200px); }
      .album-info h2 { font-size: 18px; }
      .album-info p { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- Canvas de partículas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Header -->
  <header>
    <h1>🎵 Discfy</h1>
    <div class="header-actions">
      <button id="settings-btn" title="Configurações">⚙️</button>
    </div>
  </header>

  <!-- Tela de login -->
  <div id="login-overlay">
    <h2>Discfy</h2>
    <p>Seus álbuns do Spotify em uma experiência imersiva de vinil.</p>
    <button id="login-btn">Entrar com Spotify</button>
  </div>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Carregando seus álbuns...</p>
  </div>

  <!-- Carrossel -->
  <div id="carousel-container">
    <div id="carousel-track"></div>
  </div>

  <!-- Controles de navegação -->
  <div class="nav-controls" id="nav-controls">
    <button id="prev-btn">‹</button>
    <span class="counter" id="counter">0 / 0</span>
    <button id="next-btn">›</button>
  </div>

  <!-- Modal de configurações -->
  <div id="settings-modal">
    <div class="settings-card">
      <h3>⚙️ Configurações</h3>
      <label>Ordenar por</label>
      <select id="sort-order">
        <option value="added">Data de adição</option>
        <option value="name">Nome do álbum</option>
        <option value="artist">Nome do artista</option>
      </select>
      <label>Tamanho do vinil</label>
      <select id="vinyl-size">
        <option value="large">Grande</option>
        <option value="medium" selected>Médio</option>
        <option value="small">Pequeno</option>
      </select>
      <div class="btn-row">
        <button class="save-btn" id="settings-save">Salvar</button>
        <button class="close-btn" id="settings-close">Fechar</button>
      </div>
      <button class="logout-btn" id="logout-btn">Sair da conta</button>
    </div>
  </div>

  <script>
    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    const CLIENT_ID = 'f7df44e728f54415b22b3cd561dbdfdb';
    const REDIRECT_URI = 'https://akiradv.github.io/discfy/';

    // Estado
    let accessToken = localStorage.getItem('spotify_access_token');
    let albums = [];
    let currentIndex = 0;
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    let isAnimating = false;
    let vinylSize = 'medium'; // small, medium, large

    // Elementos
    const loginOverlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const track = document.getElementById('carousel-track');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsClose = document.getElementById('settings-close');
    const settingsSave = document.getElementById('settings-save');
    const logoutBtn = document.getElementById('logout-btn');
    const sortSelect = document.getElementById('sort-order');
    const sizeSelect = document.getElementById('vinyl-size');
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');

    // ===========================
    // PARTÍCULAS
    // ===========================
    let particles = [];
    let particleColor = { r: 29, g: 185, b: 84 };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createParticles(count = 80) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 80 + 20,
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.3,
          opacity: Math.random() * 0.3 + 0.05,
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Fundo gradiente suave baseado na cor
      const grad = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 0,
        canvas.width/2, canvas.height/2, canvas.width * 0.8
      );
      const c = particleColor;
      grad.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, 0.08)`);
      grad.addColorStop(0.5, `rgba(${c.r}, ${c.g}, ${c.b}, 0.03)`);
      grad.addColorStop(1, `rgba(10, 10, 10, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Partículas
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < -p.r) p.x = canvas.width + p.r;
        if (p.x > canvas.width + p.r) p.x = -p.r;
        if (p.y < -p.r) p.y = canvas.height + p.r;
        if (p.y > canvas.height + p.r) p.y = -p.r;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${p.opacity})`;
        ctx.fill();
        ctx.shadowColor = `rgba(${c.r}, ${c.g}, ${c.b}, 0.3)`;
        ctx.shadowBlur = 40;
      });
      requestAnimationFrame(drawParticles);
    }

    function setParticleColor(r, g, b) {
      particleColor = { r, g, b };
    }

    // Inicializar partículas
    resizeCanvas();
    createParticles(100);
    drawParticles();
    window.addEventListener('resize', resizeCanvas);

    // ===========================
    // AUTENTICAÇÃO
    // ===========================
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function startLogin() {
      const verifier = generateCodeVerifier();
      localStorage.setItem('code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${REDIRECT_URI}&code_challenge_method=S256&code_challenge=${challenge}&scope=user-library-read`;
      window.location.href = authUrl;
    }

    async function handleRedirect() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (!code) return false;

      const verifier = localStorage.getItem('code_verifier');
      if (!verifier) return false;

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (data.access_token) {
        localStorage.setItem('spotify_access_token', data.access_token);
        window.history.replaceState({}, document.title, REDIRECT_URI);
        return true;
      }
      return false;
    }

    // ===========================
    // API DO SPOTIFY
    // ===========================
    async function fetchAllAlbums(token) {
      let all = [];
      let next = 'https://api.spotify.com/v1/me/albums?limit=50';
      while (next) {
        const res = await fetch(next, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('spotify_access_token');
          location.reload();
          return [];
        }
        const data = await res.json();
        all = all.concat(data.items);
        next = data.next;
      }
      return all;
    }

    async function fetchAlbumDetails(token, albumId) {
      const res = await fetch(`https://api.spotify.com/v1/albums/${albumId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      return res.json();
    }

    // ===========================
    // EXTRAIR COR DOMINANTE
    // ===========================
    function getDominantColor(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = imageUrl;
        img.onload = () => {
          const canvas2 = document.createElement('canvas');
          canvas2.width = 1;
          canvas2.height = 1;
          const ctx2 = canvas2.getContext('2d');
          ctx2.drawImage(img, 0, 0, 1, 1);
          const [r, g, b] = ctx2.getImageData(0, 0, 1, 1).data;
          resolve({ r, g, b });
        };
        img.onerror = () => resolve({ r: 29, g: 185, b: 84 });
      });
    }

    // ===========================
    // RENDERIZAR CARROSSEL
    // ===========================
    function getVinylSize() {
      switch(vinylSize) {
        case 'small': return 'min(40vh, 40vw, 200px)';
        case 'large': return 'min(85vh, 85vw, 500px)';
        default: return 'min(65vh, 65vw, 380px)';
      }
    }

    function renderAlbums(albumList) {
      track.innerHTML = '';
      albumList.forEach((item, index) => {
        const album = item.album;
        const image = album.images[0]?.url || '';
        const div = document.createElement('div');
        div.className = 'carousel-item';
        div.dataset.index = index;
        div.innerHTML = `
          <div class="vinyl-wrapper" style="width: ${getVinylSize()}; height: ${getVinylSize()};">
            <img class="vinyl-img" src="${image}" alt="${album.name}" loading="lazy" />
          </div>
          <div class="album-info">
            <h2>${album.name}</h2>
            <p>${album.artists[0]?.name || ''}</p>
            <div class="meta">
              <span>${album.release_date?.split('-')[0] || ''}</span>
              <span>${album.total_tracks} faixas</span>
            </div>
          </div>
          <button class="play-btn" onclick="window.open('https://open.spotify.com/album/${album.id}', '_blank')">▶</button>
        `;
        track.appendChild(div);
      });

      // Atualizar contador
      updateCounter();
      updateCarousel(false);

      // Extrair cor do primeiro álbum
      if (albumList.length > 0) {
        const firstImg = albumList[0].album.images[0]?.url;
        if (firstImg) {
          getDominantColor(firstImg).then(({ r, g, b }) => {
            setParticleColor(r, g, b);
          });
        }
      }
    }

    function updateCounter() {
      counter.textContent = `${currentIndex + 1} / ${albums.length}`;
    }

    function updateCarousel(animate = true) {
      const itemWidth = 100;
      const offset = -currentIndex * itemWidth;
      track.style.transition = animate ? 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)' : 'none';
      track.style.transform = `translateX(${offset}%)`;
      updateCounter();

      // Atualizar cor do fundo com base no álbum atual
      if (albums.length > 0 && albums[currentIndex]) {
        const img = albums[currentIndex].album.images[0]?.url;
        if (img) {
          getDominantColor(img).then(({ r, g, b }) => {
            setParticleColor(r, g, b);
          });
        }
      }
    }

    // ===========================
    // NAVEGAÇÃO
    // ===========================
    function goTo(index) {
      if (index < 0) index = albums.length - 1;
      if (index >= albums.length) index = 0;
      currentIndex = index;
      updateCarousel(true);
    }

    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

    // ===========================
    // ARRASTAR (MOUSE / TOUCH)
    // ===========================
    const container = document.getElementById('carousel-container');

    function onDragStart(e) {
      if (isAnimating) return;
      isDragging = true;
      const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startX = x;
      currentX = x;
      track.style.transition = 'none';
    }

    function onDragMove(e) {
      if (!isDragging) return;
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      currentX = x;
      const delta = (currentX - startX) / container.clientWidth * 100;
      const offset = -currentIndex * 100 + delta;
      track.style.transform = `translateX(${offset}%)`;
    }

    function onDragEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      const delta = (currentX - startX) / container.clientWidth * 100;
      if (Math.abs(delta) > 15) {
        if (delta < 0) goTo(currentIndex + 1);
        else goTo(currentIndex - 1);
      } else {
        updateCarousel(true);
      }
      track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    }

    // Mouse events
    container.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);

    // Touch events
    container.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('touchmove', onDragMove, { passive: true });
    window.addEventListener('touchend', onDragEnd, { passive: true });

    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    settingsBtn.addEventListener('click', () => {
      settingsModal.classList.add('open');
    });

    settingsClose.addEventListener('click', () => {
      settingsModal.classList.remove('open');
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.classList.remove('open');
    });

    settingsSave.addEventListener('click', () => {
      const sort = sortSelect.value;
      const size = sizeSelect.value;
      vinylSize = size;

      // Ordenar
      let sorted = [...albums];
      if (sort === 'name') {
        sorted.sort((a, b) => a.album.name.localeCompare(b.album.name));
      } else if (sort === 'artist') {
        sorted.sort((a, b) => a.album.artists[0]?.name.localeCompare(b.album.artists[0]?.name || ''));
      } else {
        // 'added' - manter ordem original (mais recente primeiro)
        sorted = [...albums];
      }
      albums = sorted;
      currentIndex = 0;
      renderAlbums(albums);
      settingsModal.classList.remove('open');
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('spotify_access_token');
      location.reload();
    });

    // ===========================
    // INICIALIZAÇÃO
    // ===========================
    (async function init() {
      loginBtn.addEventListener('click', startLogin);

      if (window.location.search.includes('code')) {
        const success = await handleRedirect();
        if (success) {
          accessToken = localStorage.getItem('spotify_access_token');
        }
      }

      if (accessToken) {
        loginOverlay.style.display = 'none';
        loadingScreen.classList.add('active');

        const rawAlbums = await fetchAllAlbums(accessToken);
        albums = rawAlbums;
        renderAlbums(albums);

        loadingScreen.classList.remove('active');
      } else {
        loginOverlay.style.display = 'flex';
      }
    })();

    // Atualizar tamanho do vinil ao redimensionar
    window.addEventListener('resize', () => {
      if (albums.length > 0) {
        // Re-renderizar mantendo o índice atual
        const currentAlbum = albums[currentIndex];
        renderAlbums(albums);
        // Voltar para o índice atual
        currentIndex = albums.indexOf(currentAlbum);
        if (currentIndex === -1) currentIndex = 0;
        updateCarousel(false);
      }
    });
  </script>
</body>
</html>
