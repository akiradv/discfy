<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Discfy</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Fundo gradiente dinâmico */
    #bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at center, #1a1a1a, #0a0a0a);
      transition: background 1s ease;
    }

    /* Logo */
    #logo {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Pacifico', cursive, sans-serif;
      font-size: 48px;
      font-weight: 400;
      background: linear-gradient(135deg, #fff, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* Carrossel 3D */
    #carousel-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      touch-action: none;
    }

    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .album-card {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Posições 3D */
    .album-card.center {
      transform: translateX(0) scale(1) rotateY(0deg);
      z-index: 10;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }

    .album-card.left {
      transform: translateX(-320px) scale(0.85) rotateY(35deg);
      z-index: 5;
      opacity: 0.8;
    }

    .album-card.right {
      transform: translateX(320px) scale(0.85) rotateY(-35deg);
      z-index: 5;
      opacity: 0.8;
    }

    .album-card.far-left {
      transform: translateX(-520px) scale(0.6) rotateY(45deg);
      z-index: 1;
      opacity: 0.4;
      pointer-events: none;
    }

    .album-card.far-right {
      transform: translateX(520px) scale(0.6) rotateY(-45deg);
      z-index: 1;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Nome do álbum/artista abaixo */
    #album-title {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 80%;
    }
    #album-title h2 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    #album-title p {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    /* Botão tocar */
    #play-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 12px 32px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 20px rgba(29,185,84,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #play-btn:hover { transform: translateX(-50%) scale(1.05); }

    /* Configurações e login */
    #login-overlay, #settings-modal, #loading-screen {
      /* ... mesmos estilos anteriores ... */
    }
    /* (manter estilos de login, modal, loading do código anterior) */

    /* Responsividade */
    @media (max-width: 768px) {
      .album-card { width: 180px; height: 180px; }
      .album-card.left { transform: translateX(-200px) scale(0.8) rotateY(35deg); }
      .album-card.right { transform: translateX(200px) scale(0.8) rotateY(-35deg); }
      .album-card.far-left { transform: translateX(-320px) scale(0.5) rotateY(45deg); }
      .album-card.far-right { transform: translateX(320px) scale(0.5) rotateY(-45deg); }
      #logo { font-size: 32px; top: 24px; }
      #album-title h2 { font-size: 24px; }
      #album-title p { font-size: 16px; }
      #play-btn { padding: 10px 24px; font-size: 14px; bottom: 30px; }
    }
    @media (max-width: 480px) {
      .album-card { width: 130px; height: 130px; }
      .album-card.left { transform: translateX(-140px) scale(0.75) rotateY(35deg); }
      .album-card.right { transform: translateX(140px) scale(0.75) rotateY(-35deg); }
      .album-card.far-left { transform: translateX(-220px) scale(0.45) rotateY(45deg); }
      .album-card.far-right { transform: translateX(220px) scale(0.45) rotateY(-45deg); }
      #logo { font-size: 26px; }
      #album-title h2 { font-size: 18px; }
      #album-title p { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- Fundo gradiente -->
  <div id="bg-gradient"></div>

  <!-- Logo -->
  <div id="logo">discfy</div>

  <!-- Login Overlay (mesmo código anterior) -->
  <div id="login-overlay">
    <h2>Discfy</h2>
    <p>Seus álbuns do Spotify em um carrossel 3D.</p>
    <button id="login-btn">Entrar com Spotify</button>
  </div>

  <!-- Loading (mesmo) -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Carregando seus álbuns...</p>
  </div>

  <!-- Carrossel 3D -->
  <div id="carousel-container">
    <div id="carousel-track"></div>
  </div>

  <!-- Nome do álbum/artista -->
  <div id="album-title">
    <h2 id="album-name"></h2>
    <p id="artist-name"></p>
  </div>

  <!-- Botão tocar -->
  <button id="play-btn">▶ Ouvir no Spotify</button>

  <!-- Modal de configurações (mesmo código anterior) -->
  <!-- ... -->

  <script>
    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    const CLIENT_ID = 'f7df44e728f54415b22b3cd561dbdfdb';
    const REDIRECT_URI = 'https://akiradv.github.io/discfy/';

    let accessToken = localStorage.getItem('spotify_access_token');
    let albums = [];
    let currentIndex = 0;

    // Elementos
    const loginOverlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const track = document.getElementById('carousel-track');
    const albumName = document.getElementById('album-name');
    const artistName = document.getElementById('artist-name');
    const playBtn = document.getElementById('play-btn');
    const bgGradient = document.getElementById('bg-gradient');

    // ===========================
    // AUTENTICAÇÃO (mesmo código)
    // ===========================
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function startLogin() {
      const verifier = generateCodeVerifier();
      localStorage.setItem('code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${REDIRECT_URI}&code_challenge_method=S256&code_challenge=${challenge}&scope=user-library-read`;
      window.location.href = authUrl;
    }

    async function handleRedirect() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (!code) return false;

      const verifier = localStorage.getItem('code_verifier');
      if (!verifier) return false;

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (data.access_token) {
        localStorage.setItem('spotify_access_token', data.access_token);
        window.history.replaceState({}, document.title, REDIRECT_URI);
        return true;
      }
      return false;
    }

    // ===========================
    // API
    // ===========================
    async function fetchAllAlbums(token) {
      let all = [];
      let next = 'https://api.spotify.com/v1/me/albums?limit=50';
      while (next) {
        const res = await fetch(next, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('spotify_access_token');
          location.reload();
          return [];
        }
        const data = await res.json();
        all = all.concat(data.items);
        next = data.next;
      }
      return all;
    }

    // ===========================
    // EXTRAIR COR DOMINANTE
    // ===========================
    function getDominantColor(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = imageUrl;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 1;
          canvas.height = 1;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 1, 1);
          const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
          resolve(`radial-gradient(circle at center, rgb(${r+30}, ${g+30}, ${b+30}), rgb(${r-50}, ${g-50}, ${b-50}), #0a0a0a)`);
        };
        img.onerror = () => resolve('radial-gradient(circle at center, #1a1a1a, #0a0a0a)');
      });
    }

    // ===========================
    // RENDERIZAR CARROSSEL 3D
    // ===========================
    function renderCarousel(albumList) {
      track.innerHTML = '';
      // Pré-carregar imagens para evitar flicker
      albumList.forEach(item => {
        const img = new Image();
        img.src = item.album.images[0]?.url || '';
      });

      // Criar elementos
      albumList.forEach((item, index) => {
        const album = item.album;
        const image = album.images[0]?.url || '';
        const card = document.createElement('div');
        card.className = 'album-card';
        card.dataset.index = index;
        card.innerHTML = `<img src="${image}" alt="${album.name}" loading="lazy" />`;
        card.addEventListener('click', () => {
          if (index === currentIndex) {
            // Abrir no Spotify
            window.open(`https://open.spotify.com/album/${album.id}`, '_blank');
          } else {
            goTo(index);
          }
        });
        track.appendChild(card);
      });

      // Atualizar posições
      updateCarousel(false);
      updateInfo();
      updateGradient();
    }

    function updateCarousel(animate = true) {
      const cards = track.querySelectorAll('.album-card');
      cards.forEach((card, index) => {
        const offset = index - currentIndex;
        card.className = 'album-card';
        if (offset === 0) card.classList.add('center');
        else if (offset === -1) card.classList.add('left');
        else if (offset === 1) card.classList.add('right');
        else if (offset === -2) card.classList.add('far-left');
        else if (offset === 2) card.classList.add('far-right');
        else {
          card.style.display = 'none';
          return;
        }
        card.style.display = 'block';
      });
    }

    function updateInfo() {
      if (albums.length === 0) return;
      const album = albums[currentIndex].album;
      albumName.textContent = album.name;
      artistName.textContent = album.artists[0]?.name || '';
      playBtn.onclick = () => window.open(`https://open.spotify.com/album/${album.id}`, '_blank');
    }

    async function updateGradient() {
      if (albums.length === 0) return;
      const img = albums[currentIndex].album.images[0]?.url;
      if (img) {
        const gradient = await getDominantColor(img);
        bgGradient.style.background = gradient;
      }
    }

    // ===========================
    // NAVEGAÇÃO
    // ===========================
    function goTo(index) {
      if (index < 0) index = albums.length - 1;
      if (index >= albums.length) index = 0;
      currentIndex = index;
      updateCarousel(true);
      updateInfo();
      updateGradient();
    }

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
      if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    });

    // ===========================
    // ARRASTAR (MOUSE / TOUCH)
    // ===========================
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    const container = document.getElementById('carousel-container');

    function onDragStart(e) {
      isDragging = true;
      const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startX = x;
      currentX = x;
    }

    function onDragMove(e) {
      if (!isDragging) return;
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      currentX = x;
    }

    function onDragEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      const delta = currentX - startX;
      if (Math.abs(delta) > 50) {
        if (delta < 0) goTo(currentIndex + 1);
        else goTo(currentIndex - 1);
      }
    }

    container.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    container.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('touchmove', onDragMove, { passive: true });
    window.addEventListener('touchend', onDragEnd, { passive: true });

    // ===========================
    // INICIALIZAÇÃO
    // ===========================
    (async function init() {
      loginBtn.addEventListener('click', startLogin);

      if (window.location.search.includes('code')) {
        const success = await handleRedirect();
        if (success) accessToken = localStorage.getItem('spotify_access_token');
      }

      if (accessToken) {
        loginOverlay.style.display = 'none';
        loadingScreen.style.display = 'flex';

        const rawAlbums = await fetchAllAlbums(accessToken);
        albums = rawAlbums;
        renderCarousel(albums);

        loadingScreen.style.display = 'none';
      } else {
        loginOverlay.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
