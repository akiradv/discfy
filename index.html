<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Discfy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Fundo Apple Music */
    #album-bg {
      position: fixed;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(80px) brightness(0.6);
      transition: background-image 1s ease;
    }
    #album-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .header-actions {
      display: flex;
      gap: 12px;
    }
    header button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }
    header button:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }

    /* Login */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      text-align: center;
      padding: 24px;
    }
    #login-overlay h2 {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #login-overlay p {
      color: #aaa;
      font-size: 18px;
      max-width: 400px;
      margin-bottom: 32px;
    }
    #login-overlay button {
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 14px 40px;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
    }
    #login-overlay button:hover {
      transform: scale(1.05);
    }

    /* Loading */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    #loading-screen.active {
      display: flex;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #222;
      border-top: 4px solid #1db954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Carrossel 3D - Capas quadradas */
    #carousel-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      touch-action: none;
      overflow: hidden;
    }
    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none; /* controlado pelo JS */
    }

    .album-card {
      position: absolute;
      width: min(40vh, 40vw, 260px);
      height: min(40vh, 40vw, 260px);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      will-change: transform, opacity;
    }
    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Posições */
    .album-card.center {
      transform: translateX(0) scale(1) rotateY(0deg);
      z-index: 10;
      box-shadow: 0 25px 60px rgba(0,0,0,0.9);
    }
    .album-card.left {
      transform: translateX(-120%) scale(0.85) rotateY(30deg);
      z-index: 5;
      opacity: 0.8;
    }
    .album-card.right {
      transform: translateX(120%) scale(0.85) rotateY(-30deg);
      z-index: 5;
      opacity: 0.8;
    }
    .album-card.far-left {
      transform: translateX(-200%) scale(0.55) rotateY(45deg);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
    }
    .album-card.far-right {
      transform: translateX(200%) scale(0.55) rotateY(-45deg);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
    }
    .album-card.hidden {
      display: none;
    }

    /* Nome do álbum/artista */
    #album-title {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 80%;
    }
    #album-title h2 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 700;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    #album-title p {
      font-size: clamp(16px, 2vw, 22px);
      color: rgba(255,255,255,0.7);
    }

    /* Botão tocar */
    #play-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 12px 32px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(29,185,84,0.4);
    }
    #play-btn:hover {
      transform: translateX(-50%) scale(1.05);
    }

    /* Página de detalhes (igual ao anterior, mantida) */
    #album-detail {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 80px 24px 40px;
      overflow-y: auto;
    }
    #album-detail.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 800px;
      margin: 0 auto 32px;
    }
    .detail-cover {
      width: 160px;
      height: 160px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }
    .detail-info {
      flex: 1;
      min-width: 200px;
    }
    .detail-info .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
    }
    .detail-info h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .detail-info .artist-name {
      font-size: 18px;
      color: #ddd;
      margin-bottom: 8px;
    }
    .detail-info .meta {
      font-size: 14px;
      color: #888;
    }
    .detail-info .meta span {
      margin-right: 16px;
    }
    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-actions button {
      background: #1db954;
      border: none;
      border-radius: 30px;
      padding: 10px 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .detail-actions .secondary {
      background: transparent;
      border: 1px solid #555;
      color: #ddd;
    }
    .tracklist {
      max-width: 800px;
      margin: 0 auto;
    }
    .tracklist h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ddd;
    }
    .track-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      font-size: 14px;
    }
    .track-item .track-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .track-item .track-number {
      color: #666;
      width: 24px;
      text-align: right;
    }
    .track-item .track-name {
      font-weight: 500;
    }
    .track-item .track-feat {
      font-size: 12px;
      color: #888;
    }
    .track-item .track-duration {
      color: #666;
    }
    .track-item .explicit {
      color: #888;
      font-size: 10px;
      background: #222;
      padding: 0 6px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .back-btn {
      display: block;
      margin-bottom: 20px;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      background: none;
      border: none;
    }
    .back-btn:hover {
      color: white;
    }

    /* Configurações */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
      padding: 24px;
    }
    #settings-modal.open {
      display: flex;
    }
    .settings-card {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .settings-card h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .settings-card label {
      display: block;
      font-size: 14px;
      color: #aaa;
      margin-top: 16px;
    }
    .settings-card select {
      width: 100%;
      padding: 10px 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
    }
    .settings-card .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .settings-card .btn-row button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .settings-card .save-btn {
      background: #1db954;
      color: #fff;
    }
    .settings-card .close-btn {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }
    .settings-card .logout-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #ff4444;
      border-radius: 12px;
      color: #ff4444;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .album-card { width: min(30vh, 35vw, 180px); height: min(30vh, 35vw, 180px); }
      .album-card.left { transform: translateX(-100%) scale(0.8) rotateY(30deg); }
      .album-card.right { transform: translateX(100%) scale(0.8) rotateY(-30deg); }
      .album-card.far-left { transform: translateX(-160%) scale(0.5) rotateY(45deg); }
      .album-card.far-right { transform: translateX(160%) scale(0.5) rotateY(-45deg); }
      #album-title { bottom: 80px; }
      #album-title h2 { font-size: 20px; }
      #album-title p { font-size: 14px; }
      .detail-header { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Fundo -->
  <div id="album-bg"></div>

  <!-- Header -->
  <header>
    <h1>🎵 Discfy</h1>
    <div class="header-actions">
      <button id="settings-btn">⚙️</button>
    </div>
  </header>

  <!-- Login -->
  <div id="login-overlay">
    <h2>Discfy</h2>
    <p>Seus álbuns em um carrossel 3D.</p>
    <button id="login-btn">Entrar com Spotify</button>
  </div>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <!-- Carrossel -->
  <div id="carousel-container">
    <div id="carousel-track"></div>
  </div>

  <!-- Nome do álbum -->
  <div id="album-title">
    <h2 id="album-name"></h2>
    <p id="artist-name"></p>
  </div>

  <!-- Botão tocar -->
  <button id="play-btn">▶ Ouvir no Spotify</button>

  <!-- Detalhes -->
  <div id="album-detail">
    <button class="back-btn" id="detail-back-btn">← Voltar</button>
    <div class="detail-header" id="detail-header"></div>
    <div class="tracklist" id="detail-tracklist"></div>
  </div>

  <!-- Configurações -->
  <div id="settings-modal">
    <div class="settings-card">
      <h3>⚙️ Configurações</h3>
      <label>Ordenar por</label>
      <select id="sort-order">
        <option value="added">Data de adição</option>
        <option value="name">Nome do álbum</option>
        <option value="artist">Nome do artista</option>
      </select>
      <label>Tamanho</label>
      <select id="vinyl-size">
        <option value="large">Grande</option>
        <option value="medium" selected>Médio</option>
        <option value="small">Pequeno</option>
      </select>
      <div class="btn-row">
        <button class="save-btn" id="settings-save">Salvar</button>
        <button class="close-btn" id="settings-close">Fechar</button>
      </div>
      <button class="logout-btn" id="logout-btn">Sair</button>
    </div>
  </div>

  <script>
    // CONFIGURAÇÕES
    const CLIENT_ID = 'f7df44e728f54415b22b3cd561dbdfdb';
    const REDIRECT_URI = 'https://akiradv.github.io/discfy/';

    let accessToken = localStorage.getItem('spotify_access_token');
    let albums = [];
    let currentIndex = 0;
    let vinylSize = 'medium';

    // Elementos
    const loginOverlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const track = document.getElementById('carousel-track');
    const albumName = document.getElementById('album-name');
    const artistName = document.getElementById('artist-name');
    const playBtn = document.getElementById('play-btn');
    const bg = document.getElementById('album-bg');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsClose = document.getElementById('settings-close');
    const settingsSave = document.getElementById('settings-save');
    const logoutBtn = document.getElementById('logout-btn');
    const sortSelect = document.getElementById('sort-order');
    const sizeSelect = document.getElementById('vinyl-size');
    const detailView = document.getElementById('album-detail');
    const detailHeader = document.getElementById('detail-header');
    const detailTracklist = document.getElementById('detail-tracklist');
    const detailBackBtn = document.getElementById('detail-back-btn');

    // ===========================
    // AUTENTICAÇÃO
    // ===========================
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function startLogin() {
      const verifier = generateCodeVerifier();
      localStorage.setItem('code_verifier', verifier);
      const challenge = await generateCodeChallenge(verifier);
      window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${REDIRECT_URI}&code_challenge_method=S256&code_challenge=${challenge}&scope=user-library-read`;
    }

    async function handleRedirect() {
      const code = new URLSearchParams(window.location.search).get('code');
      if (!code) return false;

      const verifier = localStorage.getItem('code_verifier');
      if (!verifier) return false;

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier
        })
      });
      const data = await res.json();
      if (data.access_token) {
        localStorage.setItem('spotify_access_token', data.access_token);
        window.history.replaceState({}, document.title, REDIRECT_URI);
        return true;
      }
      return false;
    }

    // ===========================
    // API
    // ===========================
    async function fetchAllAlbums(token) {
      let all = [];
      let next = 'https://api.spotify.com/v1/me/albums?limit=50';
      while (next) {
        const res = await fetch(next, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) {
          localStorage.removeItem('spotify_access_token');
          location.reload();
          return [];
        }
        const data = await res.json();
        all = all.concat(data.items);
        next = data.next;
      }
      return all;
    }

    async function fetchAlbumDetails(token, albumId) {
      const res = await fetch(`https://api.spotify.com/v1/albums/${albumId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      return res.json();
    }

    // ===========================
    // CARROSSEL
    // ===========================
    function getSize() {
      const s = vinylSize === 'large' ? 1.2 : vinylSize === 'small' ? 0.7 : 1;
      return `min(${35 * s}vh, ${35 * s}vw, ${220 * s}px)`;
    }

    function renderCarousel(list) {
      track.innerHTML = '';
      list.forEach((item, index) => {
        const img = item.album.images[0]?.url || '';
        const card = document.createElement('div');
        card.className = 'album-card';
        card.dataset.index = index;
        card.style.width = getSize();
        card.style.height = getSize();
        card.innerHTML = `<img src="${img}" alt="" loading="lazy" />`;
        card.addEventListener('click', () => {
          if (index === currentIndex) {
            openAlbumDetail(item.album.id);
          } else {
            goTo(index);
          }
        });
        track.appendChild(card);
      });
      updatePositions(false);
      updateInfo();
      updateBg();
    }

    function updatePositions(animate = true) {
      const cards = track.querySelectorAll('.album-card');
      cards.forEach((card, index) => {
        const offset = index - currentIndex;
        card.className = 'album-card';
        if (offset === 0) card.classList.add('center');
        else if (offset === -1) card.classList.add('left');
        else if (offset === 1) card.classList.add('right');
        else if (offset === -2) card.classList.add('far-left');
        else if (offset === 2) card.classList.add('far-right');
        else card.classList.add('hidden');
        card.style.transition = animate ? 'all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)' : 'none';
        card.style.width = getSize();
        card.style.height = getSize();
      });
    }

    function updateInfo() {
      if (!albums.length) return;
      const a = albums[currentIndex].album;
      albumName.textContent = a.name;
      artistName.textContent = a.artists[0]?.name || '';
      playBtn.onclick = () => window.open(`https://open.spotify.com/album/${a.id}`, '_blank');
    }

    function updateBg() {
      if (!albums.length) return;
      const img = albums[currentIndex].album.images[0]?.url;
      if (img) bg.style.backgroundImage = `url(${img})`;
    }

    function goTo(index) {
      if (index < 0) index = albums.length - 1;
      if (index >= albums.length) index = 0;
      currentIndex = index;
      updatePositions(true);
      updateInfo();
      updateBg();
    }

    // ===========================
    // ARRASTAR (REFATORADO)
    // ===========================
    let startX = 0;
    let currentX = 0;
    let isDragging = false;
    let isGesture = false;
    const container = document.getElementById('carousel-container');

    function onStart(e) {
      if (detailView.style.display === 'block') return;
      isDragging = true;
      isGesture = false;
      const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startX = x;
      currentX = x;
    }

    function onMove(e) {
      if (!isDragging) return;
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      currentX = x;
      const delta = (currentX - startX) / window.innerWidth * 100;
      if (Math.abs(delta) > 3) isGesture = true;
      const offset = -currentIndex * 100 + delta;
      // Aplica transformação visual sem mexer nas posições finais
      const cards = track.querySelectorAll('.album-card');
      cards.forEach((card, index) => {
        const baseOffset = index - currentIndex;
        const adjusted = baseOffset + delta / 100;
        // Interpolação simples para visualização durante o arrasto
        // (aqui só atualizamos o track como um todo para ser mais suave)
      });
      track.style.transition = 'none';
      track.style.transform = `translateX(${delta}%)`;
    }

    function onEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      const delta = (currentX - startX) / window.innerWidth * 100;
      track.style.transition = '';
      track.style.transform = '';

      if (Math.abs(delta) > 12) {
        if (delta < 0) goTo(currentIndex + 1);
        else goTo(currentIndex - 1);
      } else {
        updatePositions(true);
      }
    }

    container.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    container.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('touchend', onEnd, { passive: true });

    // Teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
      if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    });

    // ===========================
    // DETALHES
    // ===========================
    async function openAlbumDetail(id) {
      detailView.style.display = 'block';
      detailView.classList.remove('active');
      try {
        const album = await fetchAlbumDetails(accessToken, id);
        const img = album.images[0]?.url || '';
        const totalMin = Math.floor(album.tracks.items.reduce((s, t) => s + t.duration_ms, 0) / 60000);

        // Cor dominante simples
        const color = await new Promise(resolve => {
          const i = new Image();
          i.crossOrigin = 'Anonymous';
          i.src = img;
          i.onload = () => {
            const c = document.createElement('canvas');
            c.width = 1; c.height = 1;
            const ctx = c.getContext('2d');
            ctx.drawImage(i, 0, 0, 1, 1);
            const [r,g,b] = ctx.getImageData(0,0,1,1).data;
            resolve(`rgb(${r},${g},${b})`);
          };
          i.onerror = () => resolve('#1db954');
        });

        detailHeader.innerHTML = `
          <img class="detail-cover" src="${img}" style="border: 2px solid ${color};" />
          <div class="detail-info">
            <div class="label">Álbum</div>
            <h2 style="color:${color};">${album.name}</h2>
            <div class="artist-name">${album.artists.map(a => a.name).join(', ')}</div>
            <div class="meta">
              <span>${album.release_date?.split('-')[0] || ''}</span>
              <span>${album.tracks.items.length} músicas</span>
              <span>${totalMin} min</span>
            </div>
            <div class="detail-actions">
              <button onclick="window.open('https://open.spotify.com/album/${album.id}', '_blank')">▶ Ouvir</button>
              <button class="secondary" onclick="closeDetail()">Voltar</button>
            </div>
          </div>
        `;

        detailTracklist.innerHTML = '<h3>Faixas</h3>';
        album.tracks.items.forEach((t, i) => {
          const min = Math.floor(t.duration_ms / 60000);
          const sec = ((t.duration_ms % 60000) / 1000).toFixed(0).padStart(2, '0');
          const feat = t.artists.filter(a => !album.artists.some(ma => ma.id === a.id));
          const featText = feat.length ? ` (feat. ${feat.map(a => a.name).join(', ')})` : '';
          const div = document.createElement('div');
          div.className = 'track-item';
          div.innerHTML = `
            <div class="track-left">
              <span class="track-number">${i+1}</span>
              <span class="track-name">${t.name}</span>
              ${featText}
              ${t.explicit ? '<span class="explicit">E</span>' : ''}
            </div>
            <span class="track-duration">${min}:${sec}</span>
          `;
          detailTracklist.appendChild(div);
        });

        setTimeout(() => detailView.classList.add('active'), 10);
      } catch (err) {
        detailTracklist.innerHTML = '<p style="color:#ff4444;">Erro ao carregar detalhes.</p>';
      }
    }

    function closeDetail() {
      detailView.classList.remove('active');
      setTimeout(() => { detailView.style.display = 'none'; }, 400);
    }

    detailBackBtn.addEventListener('click', closeDetail);

    // ===========================
    // CONFIGURAÇÕES
    // ===========================
    settingsBtn.addEventListener('click', () => settingsModal.classList.add('open'));
    settingsClose.addEventListener('click', () => settingsModal.classList.remove('open'));
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.classList.remove('open');
    });

    settingsSave.addEventListener('click', () => {
      const sort = sortSelect.value;
      vinylSize = sizeSelect.value;

      let sorted = [...albums];
      if (sort === 'name') sorted.sort((a,b) => a.album.name.localeCompare(b.album.name));
      else if (sort === 'artist') sorted.sort((a,b) => a.album.artists[0]?.name.localeCompare(b.album.artists[0]?.name || ''));
      albums = sorted;
      currentIndex = 0;
      renderCarousel(albums);
      settingsModal.classList.remove('open');
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('spotify_access_token');
      location.reload();
    });

    // ===========================
    // INICIALIZAÇÃO
    // ===========================
    (async function() {
      loginBtn.addEventListener('click', startLogin);

      if (window.location.search.includes('code')) {
        const success = await handleRedirect();
        if (success) accessToken = localStorage.getItem('spotify_access_token');
      }

      if (accessToken) {
        loginOverlay.style.display = 'none';
        loadingScreen.classList.add('active');

        const raw = await fetchAllAlbums(accessToken);
        albums = raw;
        renderCarousel(albums);

        loadingScreen.classList.remove('active');
      } else {
        loginOverlay.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
